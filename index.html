<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Explorer 2026</title>
    <!-- Font Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* === Variabel Warna & Reset === */
        :root {
            --bg-color: #0f0c29;
            --primary-color: #ff007f;
            --secondary-color: #7928ca;
            --text-light: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* === Background Animasi === */
        body {
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* === Header & Neon Text === */
        header {
            text-align: center;
            padding: 3rem 1rem 1rem 1rem;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(to right, #ff007f, #7928ca, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(255,0,127,0.2), 0 0 20px rgba(255,0,127,0.2); }
            to { text-shadow: 0 0 20px rgba(0,210,255,0.6), 0 0 30px rgba(121,40,202,0.6); }
        }

        #season-info {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #00d2ff;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* === Kontrol Filter (Dropdown Tahun & Musim) === */
        .controls-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            padding: 0 1rem;
        }

        select {
            appearance: none;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border: 1px solid var(--primary-color);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.2);
            transition: all 0.3s ease;
            text-align: center;
            min-width: 150px;
        }

        select:hover, select:focus {
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.5);
            border-color: #00d2ff;
        }

        select option {
            background: #24243e;
            color: #fff;
        }

        /* === Loader Animasi === */
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 30vh;
            width: 100%;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #00d2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* === Grid Layout === */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem 3rem 2rem;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* === Glassmorphism Card === */
        .anime-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.4s ease;
            cursor: pointer;
            
            /* Animasi masuk */
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.5s ease forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .anime-card:hover {
            transform: translateY(-10px) !important;
            box-shadow: 0 15px 40px rgba(0, 210, 255, 0.3);
            border-color: #00d2ff;
        }

        .anime-image {
            width: 100%;
            height: 400px;
            position: relative;
            overflow: hidden;
        }

        .anime-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .anime-card:hover .anime-image img {
            transform: scale(1.1);
        }

        .anime-score {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.8);
            color: #ffd700;
            padding: 5px 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            border: 1px solid #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            z-index: 2;
        }

        .anime-info {
            padding: 1.5rem;
        }

        .anime-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .anime-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 1rem;
        }

        .genre-tag {
            background: linear-gradient(45deg, var(--secondary-color), var(--primary-color));
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .anime-synopsis {
            font-size: 0.85rem;
            color: #ccc;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Pesan Kosong / Error */
        .message {
            text-align: center;
            width: 100%;
            font-size: 1.2rem;
            color: #ff007f;
            grid-column: 1 / -1;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header h1 { font-size: 2.2rem; }
            .anime-image { height: 350px; }
            .controls-container { flex-direction: column; align-items: center; }
            select { width: 80%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Anime Explorer</h1>
        <p id="season-info">Memuat data...</p>
    </header>

    <!-- Filter Kontrol -->
    <div class="controls-container">
        <select id="season-select">
            <option value="winter">❄️ Winter (Jan - Mar)</option>
            <option value="spring">🌸 Spring (Apr - Jun)</option>
            <option value="summer">☀️ Summer (Jul - Sep)</option>
            <option value="fall">🍂 Fall (Okt - Des)</option>
        </select>

        <select id="year-select">
            <!-- Tahun akan digenerate otomatis oleh JavaScript -->
        </select>
    </div>

    <main>
        <div id="loader" class="loader-container">
            <div class="loader"></div>
        </div>

        <div id="anime-container" class="anime-grid"></div>
    </main>

    <script>
        const container = document.getElementById('anime-container');
        const loader = document.getElementById('loader');
        const seasonSelect = document.getElementById('season-select');
        const yearSelect = document.getElementById('year-select');
        const seasonInfo = document.getElementById('season-info');

        // Fungsi untuk menentukan Musim dan Tahun saat ini secara otomatis
        function initDefaults() {
            const date = new Date();
            const currentYear = date.getFullYear();
            const month = date.getMonth() + 1; // getMonth() mulai dari 0

            let currentSeason = "winter";
            if (month >= 4 && month <= 6) currentSeason = "spring";
            else if (month >= 7 && month <= 9) currentSeason = "summer";
            else if (month >= 10 && month <= 12) currentSeason = "fall";

            // Generate opsi tahun ke Select Box (dari tahun depan sampai tahun 2000)
            for (let y = currentYear + 1; y >= 2000; y--) {
                const option = document.createElement('option');
                option.value = y;
                option.textContent = `Tahun ${y}`;
                yearSelect.appendChild(option);
            }

            // Set default value di dropdown
            yearSelect.value = currentYear;
            seasonSelect.value = currentSeason;

            // Fetch data pertama kali
            fetchAnime(currentYear, currentSeason);
        }

        // Fungsi utama untuk mengambil data berdasarkan Tahun dan Musim
        async function fetchAnime(year, season) {
            // Kosongkan container dan tampilkan loader
            container.innerHTML = '';
            loader.style.display = 'flex';
            
            // Ubah teks judul agar interaktif
            const seasonName = season.charAt(0).toUpperCase() + season.slice(1);
            seasonInfo.textContent = `Menampilkan Anime Musim ${seasonName} ${year}`;

            try {
                // Endpoint Jikan API spesifik per musim
                const response = await fetch(`https://api.jikan.moe/v4/seasons/${year}/${season}`);
                
                if (!response.ok) throw new Error('Gagal memuat data dari API');
                
                const data = await response.json();
                const animes = data.data;

                loader.style.display = 'none';

                if (animes.length === 0) {
                    container.innerHTML = `<p class="message">Belum ada data anime untuk rilis di musim ini.</p>`;
                    return;
                }

                // Render Kartu Anime
                animes.forEach((anime, index) => {
                    const synopsis = anime.synopsis ? anime.synopsis : 'Sinopsis tidak tersedia.';
                    const genres = anime.genres.slice(0, 3).map(g => `<span class="genre-tag">${g.name}</span>`).join('');
                    const score = anime.score ? anime.score : 'N/A';
                    const imageUrl = anime.images.jpg.large_image_url;

                    const card = document.createElement('div');
                    card.classList.add('anime-card');
                    card.style.animationDelay = `${(index % 10) * 0.1}s`; // Batasi delay maksimal agar tidak terlalu lama

                    card.innerHTML = `
                        <div class="anime-image">
                            <span class="anime-score">★ ${score}</span>
                            <img src="${imageUrl}" alt="${anime.title}" loading="lazy">
                        </div>
                        <div class="anime-info">
                            <h2 class="anime-title" title="${anime.title}">${anime.title}</h2>
                            <div class="anime-genres">${genres}</div>
                            <p class="anime-synopsis">${synopsis}</p>
                        </div>
                    `;

                    // Klik untuk ke MyAnimeList
                    card.onclick = () => window.open(anime.url, '_blank');
                    container.appendChild(card);
                });

            } catch (error) {
                loader.style.display = 'none';
                container.innerHTML = `<p class="message">Terjadi kesalahan / Terlalu banyak permintaan API. Harap tunggu beberapa detik dan coba lagi.</p>`;
            }
        }

        // Jalankan saat dropdown diubah
        seasonSelect.addEventListener('change', () => {
            fetchAnime(yearSelect.value, seasonSelect.value);
        });

        yearSelect.addEventListener('change', () => {
            fetchAnime(yearSelect.value, seasonSelect.value);
        });

        // Inisialisasi saat web pertama kali dibuka
        document.addEventListener('DOMContentLoaded', initDefaults);

    </script>
</body>
</html>
